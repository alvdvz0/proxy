<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прокси для Telegram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0088cc, #00a8e8);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 8px 24px rgba(0,136,204,0.3);
        }
        
        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .status-block {
            background: #f5f5f7;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }
        
        .status-block.checking {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
            transition: all 0.3s;
        }
        
        .status-dot.online {
            background: #34c759;
            box-shadow: 0 0 10px #34c759;
        }
        
        .status-dot.offline {
            background: #ff3b30;
            box-shadow: 0 0 10px #ff3b30;
        }
        
        .ping {
            color: #666;
            font-size: 13px;
        }
        
        .proxy-info {
            background: #1a1a1a;
            color: #fff;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-align: left;
            position: relative;
        }
        
        .proxy-info label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 4px;
        }
        
        .proxy-row {
            margin-bottom: 12px;
        }
        
        .proxy-row:last-child {
            margin-bottom: 0;
        }
        
        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0088cc, #00a8e8);
            color: white;
            box-shadow: 0 4px 16px rgba(0,136,204,0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,136,204,0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f5f5f7;
            color: #1a1a1a;
        }
        
        .btn-secondary:hover {
            background: #e8e8ed;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .error-message {
            background: #ffe5e5;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .ip-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>MTProto Proxy</h1>
        <p class="subtitle">Быстрый и безопасный доступ к Telegram</p>
        
        <div class="ip-info" id="ipInfo" style="display: none;">
            🔍 Ваш IP записан для анализа
        </div>
        
        <div class="status-block checking" id="statusBlock">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Проверка прокси...</span>
            </div>
            <div class="ping" id="pingText">Измерение задержки</div>
        </div>
        
        <div class="proxy-info">
            <div class="proxy-row">
                <label>Сервер</label>
                <div id="serverAddress">{{ proxy_host }}</div>
            </div>
            <div class="proxy-row">
                <label>Порт</label>
                <div id="serverPort">{{ proxy_port }}</div>
            </div>
            <div class="proxy-row">
                <label>Секрет</label>
                <div id="serverSecret">{{ proxy_secret[:6] }}...{{ proxy_secret[-4:] if proxy_secret|length > 10 else '' }}</div>
            </div>
        </div>
        
        <button class="btn btn-primary" id="connectBtn" disabled onclick="connectToTelegram()">
            <span id="btnText">Подождите...</span>
        </button>
        
        <button class="btn btn-secondary" onclick="copySettings()">
            📋 Копировать настройки
        </button>
        
        <div class="error-message" id="errorMessage"></div>
    </div>
    
    <div class="toast" id="toast">Скопировано в буфер обмена!</div>

    <script>
        const PROXY_CONFIG = {
            host: "{{ proxy_host }}",
            port: {{ proxy_port }},
            secret: "{{ proxy_secret }}"
        };
        
        let isProxyAvailable = false;
        let pingMs = 0;
        let checkCompleted = false;
        
        // Проверка доступности прокси с отправкой данных на сервер
        async function checkProxyAndNotify() {
            const startTime = performance.now();
            const statusBlock = document.getElementById('statusBlock');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const pingText = document.getElementById('pingText');
            const connectBtn = document.getElementById('connectBtn');
            const btnText = document.getElementById('btnText');
            const ipInfo = document.getElementById('ipInfo');
            
            let checkResult = {
                available: false,
                ping: 0,
                error: null
            };
            
            try {
                // Проверка доступности через WebSocket
                await checkWebSocket();
                
                pingMs = Math.round(performance.now() - startTime);
                checkResult = {
                    available: true,
                    ping: pingMs,
                    error: null
                };
                
                isProxyAvailable = true;
                statusBlock.classList.remove('checking');
                statusDot.classList.add('online');
                statusText.textContent = 'Прокси доступен';
                pingText.textContent = `Задержка: ${pingMs} мс`;
                
            } catch (error) {
                checkResult = {
                    available: false,
                    ping: 0,
                    error: error.message
                };
                
                // Даже если проверка не удалась, показываем как "возможно доступен"
                statusBlock.classList.remove('checking');
                statusDot.classList.add('online');
                statusText.textContent = 'Прокси готов к подключению';
                pingText.textContent = 'Проверьте соединение';
                isProxyAvailable = true;
            }
            
            // Отправляем результат на сервер (логирование IP)
            try {
                await fetch('/api/check-proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(checkResult)
                });
                ipInfo.style.display = 'block';
                setTimeout(() => ipInfo.style.display = 'none', 3000);
            } catch (e) {
                console.error('Ошибка логирования:', e);
            }
            
            checkCompleted = true;
            connectBtn.disabled = false;
            btnText.textContent = 'Подключить к Telegram';
        }
        
        function checkWebSocket() {
            return new Promise((resolve, reject) => {
                const ws = new WebSocket(`wss://${PROXY_CONFIG.host}:${PROXY_CONFIG.port}`);
                const timeout = setTimeout(() => {
                    ws.close();
                    reject(new Error('Timeout'));
                }, 3000);
                
                ws.onopen = () => {
                    clearTimeout(timeout);
                    ws.close();
                    resolve(true);
                };
                
                ws.onerror = () => {
                    clearTimeout(timeout);
                    resolve(true); // Оптимистично считаем доступным
                };
            });
        }
        
        function connectToTelegram() {
            const tgLink = `tg://proxy?server=${encodeURIComponent(PROXY_CONFIG.host)}&port=${PROXY_CONFIG.port}&secret=${encodeURIComponent(PROXY_CONFIG.secret)}`;
            
            window.location.href = tgLink;
            
            setTimeout(() => {
                showToast('Если Telegram не открылся, скопируйте настройки');
            }, 1000);
        }
        
        function copySettings() {
            const text = `Сервер: ${PROXY_CONFIG.host}\nПорт: ${PROXY_CONFIG.port}\nСекрет: ${PROXY_CONFIG.secret}`;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('Настройки скопированы!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Настройки скопированы!');
            });
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Запускаем проверку при загрузке
        window.addEventListener('load', checkProxyAndNotify);
    </script>
</body>
</html>
